services:
  powerdirector-gateway:
    image: ${POWERDIRECTOR_IMAGE:-powerdirector:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      POWERDIRECTOR_GATEWAY_TOKEN: ${POWERDIRECTOR_GATEWAY_TOKEN}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${POWERDIRECTOR_CONFIG_DIR}:/home/node/.powerdirector
      - ${POWERDIRECTOR_WORKSPACE_DIR}:/home/node/.powerdirector/workspace
    ports:
      - "${POWERDIRECTOR_GATEWAY_PORT:-18789}:18789"
      - "${POWERDIRECTOR_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${POWERDIRECTOR_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]

  powerdirector-cli:
    image: ${POWERDIRECTOR_IMAGE:-powerdirector:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      POWERDIRECTOR_GATEWAY_TOKEN: ${POWERDIRECTOR_GATEWAY_TOKEN}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${POWERDIRECTOR_CONFIG_DIR}:/home/node/.powerdirector
      - ${POWERDIRECTOR_WORKSPACE_DIR}:/home/node/.powerdirector/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
