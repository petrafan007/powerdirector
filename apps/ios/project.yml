name: PowerDirector
options:
  bundleIdPrefix: ai.powerdirector
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_APP_INTENTS_METADATA_GENERATION: NO

packages:
  PowerDirectorKit:
    path: ../shared/PowerDirectorKit
  Swabble:
    path: ../../Swabble

schemes:
  PowerDirector:
    shared: true
    build:
      targets:
        PowerDirector: all
    test:
      targets:
        - PowerDirectorTests
        - PowerDirectorLogicTests
  PowerDirectorLogicTests:
    shared: true
    build:
      targets:
        PowerDirectorLogicTests: all
    test:
      targets:
        - PowerDirectorLogicTests

targets:
  PowerDirector:
    type: application
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Sources
    dependencies:
      - target: PowerDirectorShareExtension
        embed: true
      - target: PowerDirectorActivityWidget
        embed: true
      - target: PowerDirectorWatchApp
      - package: PowerDirectorKit
      - package: PowerDirectorKit
        product: PowerDirectorChatUI
      - package: PowerDirectorKit
        product: PowerDirectorProtocol
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    preBuildScripts:
      - name: SwiftFormat (lint)
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftformat >/dev/null 2>&1; then
            echo "error: swiftformat not found (brew install swiftformat)" >&2
            exit 1
          fi
          swiftformat --lint --config "$SRCROOT/../../.swiftformat" \
            --filelist "$SRCROOT/SwiftSources.input.xcfilelist"
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftlint >/dev/null 2>&1; then
            echo "error: swiftlint not found (brew install swiftlint)" >&2
            exit 1
          fi
          swiftlint lint --config "$SRCROOT/.swiftlint.yml" --use-script-input-file-lists
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: Sources/PowerDirector.entitlements
        CODE_SIGN_STYLE: "$(POWERDIRECTOR_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(POWERDIRECTOR_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(POWERDIRECTOR_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(POWERDIRECTOR_APP_PROFILE)"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
      configs:
        Debug:
          POWERDIRECTOR_PUSH_TRANSPORT: direct
          POWERDIRECTOR_PUSH_DISTRIBUTION: local
          POWERDIRECTOR_PUSH_RELAY_BASE_URL: ""
          POWERDIRECTOR_PUSH_APNS_ENVIRONMENT: sandbox
        Release:
          POWERDIRECTOR_PUSH_TRANSPORT: direct
          POWERDIRECTOR_PUSH_DISTRIBUTION: local
          POWERDIRECTOR_PUSH_RELAY_BASE_URL: ""
          POWERDIRECTOR_PUSH_APNS_ENVIRONMENT: production
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: PowerDirector
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLName: ai.powerdirector.ios
            CFBundleURLSchemes:
              - powerdirector
        CFBundleShortVersionString: "$(POWERDIRECTOR_MARKETING_VERSION)"
        CFBundleVersion: "$(POWERDIRECTOR_BUILD_VERSION)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - ai.powerdirector.ios.bgrefresh
        NSLocalNetworkUsageDescription: PowerDirector discovers and connects to your PowerDirector gateway on the local network.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInWebContent: true
        NSBonjourServices:
          - _powerdirector-gw._tcp
        NSCameraUsageDescription: PowerDirector can capture photos or short video clips when requested via the gateway.
        NSLocationWhenInUseUsageDescription: PowerDirector uses your location when you allow location sharing.
        NSLocationAlwaysAndWhenInUseUsageDescription: PowerDirector can share your location in the background when you enable Always.
        NSMicrophoneUsageDescription: PowerDirector needs microphone access for voice wake.
        NSMotionUsageDescription: PowerDirector may use motion data to support device-aware interactions and automations.
        NSPhotoLibraryUsageDescription: PowerDirector needs photo library access when you choose existing photos to share with your assistant.
        NSSpeechRecognitionUsageDescription: PowerDirector uses on-device speech recognition for voice wake.
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
        PowerDirectorPushTransport: "$(POWERDIRECTOR_PUSH_TRANSPORT)"
        PowerDirectorPushDistribution: "$(POWERDIRECTOR_PUSH_DISTRIBUTION)"
        PowerDirectorPushRelayBaseURL: "$(POWERDIRECTOR_PUSH_RELAY_BASE_URL)"
        PowerDirectorPushAPNsEnvironment: "$(POWERDIRECTOR_PUSH_APNS_ENVIRONMENT)"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  PowerDirectorShareExtension:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ShareExtension
    dependencies:
      - package: PowerDirectorKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(POWERDIRECTOR_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(POWERDIRECTOR_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(POWERDIRECTOR_SHARE_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(POWERDIRECTOR_SHARE_PROFILE)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: PowerDirector Share
        CFBundleShortVersionString: "$(POWERDIRECTOR_MARKETING_VERSION)"
        CFBundleVersion: "$(POWERDIRECTOR_BUILD_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 10
              NSExtensionActivationSupportsMovieWithMaxCount: 1

  PowerDirectorActivityWidget:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ActivityWidget
      - path: Sources/LiveActivity/PowerDirectorActivityAttributes.swift
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(POWERDIRECTOR_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(POWERDIRECTOR_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(POWERDIRECTOR_ACTIVITY_WIDGET_BUNDLE_ID)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
    info:
      path: ActivityWidget/Info.plist
      properties:
        CFBundleDisplayName: PowerDirector Activity
        CFBundleShortVersionString: "$(POWERDIRECTOR_MARKETING_VERSION)"
        CFBundleVersion: "$(POWERDIRECTOR_BUILD_VERSION)"
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  PowerDirectorWatchApp:
    type: application.watchapp2
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchApp
    dependencies:
      - target: PowerDirectorWatchExtension
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(POWERDIRECTOR_WATCH_APP_BUNDLE_ID)"
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: PowerDirector
        CFBundleShortVersionString: "$(POWERDIRECTOR_MARKETING_VERSION)"
        CFBundleVersion: "$(POWERDIRECTOR_BUILD_VERSION)"
        WKCompanionAppBundleIdentifier: "$(POWERDIRECTOR_APP_BUNDLE_ID)"
        WKWatchKitApp: true

  PowerDirectorWatchExtension:
    type: watchkit2-extension
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchExtension/Sources
    dependencies:
      - sdk: AppIntents.framework
      - sdk: WatchConnectivity.framework
      - sdk: UserNotifications.framework
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "$(POWERDIRECTOR_WATCH_EXTENSION_BUNDLE_ID)"
    info:
      path: WatchExtension/Info.plist
      properties:
        CFBundleDisplayName: PowerDirector
        CFBundleShortVersionString: "$(POWERDIRECTOR_MARKETING_VERSION)"
        CFBundleVersion: "$(POWERDIRECTOR_BUILD_VERSION)"
        NSExtension:
          NSExtensionAttributes:
            WKAppBundleIdentifier: "$(POWERDIRECTOR_WATCH_APP_BUNDLE_ID)"
          NSExtensionPointIdentifier: com.apple.watchkit

  PowerDirectorTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests
        excludes:
          - Logic
    dependencies:
      - target: PowerDirector
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(POWERDIRECTOR_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(POWERDIRECTOR_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.powerdirector.ios.tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/PowerDirector.app/PowerDirector"
        BUNDLE_LOADER: "$(TEST_HOST)"
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: PowerDirectorTests
        CFBundleShortVersionString: "$(POWERDIRECTOR_MARKETING_VERSION)"
        CFBundleVersion: "$(POWERDIRECTOR_BUILD_VERSION)"

  PowerDirectorLogicTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests/Logic
    dependencies:
      - package: PowerDirectorKit
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(POWERDIRECTOR_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(POWERDIRECTOR_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.powerdirector.ios.logic-tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: PowerDirectorLogicTests
        CFBundleShortVersionString: "$(POWERDIRECTOR_MARKETING_VERSION)"
        CFBundleVersion: "$(POWERDIRECTOR_BUILD_VERSION)"
